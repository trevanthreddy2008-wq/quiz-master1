name: Build Quiz Master APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.keystore"
        continue-on-error: true
      - name: Build SIGNED release AAB
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: gradle bundleRelease --no-daemon
        continue-on-error: true
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: QuizMaster-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: QuizMaster-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
        continue-on-error: true
